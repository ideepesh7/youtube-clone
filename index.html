<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>YouTube Clone</title>
  <link rel="stylesheet" href="style.css?v=1.1" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>

<header class="navbar">
  <div class="nav-left">
    <button class="icon-btn" id="menuBtn"><i class="fas fa-bars"></i></button>
    <a href="index.html" class="logo" id="logoHome">
      <i class="fab fa-youtube" style="color: #f00; font-size: 24px;"></i>
      <span class="logo-text">YouTube</span>
    </a>
  </div>
  <div class="nav-center">
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="Search" autocomplete="off" />
      <button id="searchBtn" class="search-btn"><i class="fas fa-search"></i></button>
    </div>
    <button class="icon-btn mic-btn"><i class="fas fa-microphone"></i></button>
  </div>
  <div class="nav-right">
    <button class="icon-btn"><i class="fas fa-video"></i></button>
    <button class="icon-btn"><i class="fas fa-th"></i></button>
    <button class="icon-btn"><i class="fas fa-bell"></i></button>
    <div class="avatar">D</div>
  </div>
</header>

<div class="page-layout">
  <aside class="sidebar" id="sidebar">
    <nav>
      <a href="index.html" class="sidebar-item active"><i class="fas fa-home"></i><span>Home</span></a>
      <a href="#" class="sidebar-item"><i class="fas fa-bolt"></i><span>Shorts</span></a>
      <a href="#" class="sidebar-item"><i class="fas fa-play-circle"></i><span>Subscriptions</span></a>
      <hr class="sidebar-divider">
      <a href="#" class="sidebar-item"><i class="fas fa-folder"></i><span>Library</span></a>
      <a href="#" class="sidebar-item"><i class="fas fa-history"></i><span>History</span></a>
      <a href="#" class="sidebar-item"><i class="fas fa-clock"></i><span>Watch later</span></a>
      <a href="#" class="sidebar-item"><i class="fas fa-thumbs-up"></i><span>Liked videos</span></a>
    </nav>
  </aside>

  <main class="main-content">
    <div class="chips-bar" id="chipsBar">
      <button class="chip active" data-q="trending">All</button>
      <button class="chip" data-q="new music">Music</button>
      <button class="chip" data-q="gaming highlights">Gaming</button>
      <button class="chip" data-q="daily news">News</button>
      <button class="chip" data-q="cricket">Cricket</button>
      <button class="chip" data-q="tech reviews">Tech</button>
      <button class="chip" data-q="live stream">Live</button>
      <button class="chip" data-q="tutorials">Education</button>
      <button class="chip" data-q="comedy gold">Comedy</button>
    </div>

    <div class="videos-grid" id="videosGrid">
      <!-- Skeletons populated by JS -->
    </div>
  </main>
</div>

<script src="app.js?v=1.2"></script>
</body>
</html>
