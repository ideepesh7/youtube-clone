<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video Player - YouTube Clone</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    .video-page { display: flex; gap: 24px; padding: 24px; max-width: 1800px; margin: 0 auto; }
    .video-primary { flex: 1; min-width: 0; }
    .video-player { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 12px; overflow: hidden; }
    .video-player iframe { width: 100%; height: 100%; border: none; }
    .video-meta { margin-top: 12px; }
    .video-title { font-size: 20px; font-weight: 500; margin-bottom: 12px; }
    .video-info-bar { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #333; }
    .channel-info { display: flex; align-items: center; gap: 12px; }
    .channel-avatar-large { width: 40px; height: 40px; border-radius: 50%; background: #f44336; display: flex; align-items: center; justify-content: center; color: white; font-weight: 500; }
    .channel-details { flex: 1; }
    .channel-name-large { font-weight: 500; }
    .subscribers { font-size: 12px; color: #aaa; }
    .subscribe-btn { background: #fff; color: #000; border: none; padding: 10px 16px; border-radius: 18px; font-weight: 500; cursor: pointer; }
    .video-actions { display: flex; gap: 8px; }
    .action-btn { background: #272727; border: none; padding: 10px 16px; border-radius: 18px; color: #fff; cursor: pointer; display: flex; align-items: center; gap: 6px; }
    .video-secondary { width: 400px; }
    .suggested-video { display: flex; gap: 8px; margin-bottom: 8px; cursor: pointer; }
    .suggested-thumb { width: 168px; height: 94px; border-radius: 8px; background: #333; position: relative; flex-shrink: 0; }
    .suggested-thumb img { width: 100%; height: 100%; object-fit: cover; border-radius: 8px; }
    .suggested-info { flex: 1; }
    .suggested-title { font-size: 14px; font-weight: 500; margin-bottom: 4px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .suggested-meta { font-size: 12px; color: #aaa; }
    @media (max-width: 1024px) { .video-page { flex-direction: column; } .video-secondary { width: 100%; } }
  </style>
</head>
<body>
  <header class="navbar">
    <div class="nav-left">
      <button class="icon-btn" id="menuBtn"><i class="fas fa-bars"></i></button>
      <a href="index.html" class="logo">
        <i class="fab fa-youtube" style="color: #f00; font-size: 24px;"></i>
        <span class="logo-text">YouTube</span>
      </a>
    </div>
    <div class="nav-center">
      <div class="search-bar">
        <input type="text" id="searchInput" placeholder="Search" autocomplete="off">
        <button id="searchBtn" class="search-btn"><i class="fas fa-search"></i></button>
      </div>
      <button class="icon-btn mic-btn"><i class="fas fa-microphone"></i></button>
    </div>
    <div class="nav-right">
      <button class="icon-btn"><i class="fas fa-video"></i></button>
      <button class="icon-btn"><i class="fas fa-th"></i></button>
      <button class="icon-btn"><i class="fas fa-bell"></i></button>
      <div class="avatar">D</div>
    </div>
  </header>

  <div class="video-page">
    <div class="video-primary">
      <div class="video-player" id="videoPlayer"></div>
      <div class="video-meta">
        <h1 class="video-title" id="videoTitle">Loading...</h1>
        <div class="video-info-bar">
          <div class="channel-info">
            <div class="channel-avatar-large" id="channelAvatar">Y</div>
            <div class="channel-details">
              <div class="channel-name-large" id="channelName">Loading...</div>
              <div class="subscribers" id="subscribers">Loading...</div>
            </div>
            <button class="subscribe-btn">Subscribe</button>
          </div>
          <div class="video-actions">
            <button class="action-btn"><i class="fas fa-thumbs-up"></i> <span id="likes">0</span></button>
            <button class="action-btn"><i class="fas fa-thumbs-down"></i></button>
            <button class="action-btn"><i class="fas fa-share"></i> Share</button>
          </div>
        </div>
      </div>
    </div>

    <div class="video-secondary" id="suggestedVideos"></div>
  </div>

  <script>
    const API_KEY = 'AIzaSyA8K0RzQ9Q_EwOWzp7cVJPzJBJh8KI8XqI';
    const BASE_URL = 'https://www.googleapis.com/youtube/v3';
    const videoId = localStorage.getItem('currentVideoId') || 'dQw4w9WgXcQ';

    function getChannelInitial(name) { return name ? name.charAt(0).toUpperCase() : 'Y'; }
    function formatViews(count) {
      const n = parseInt(count);
      if (n >= 1000000) return Math.floor(n / 1000000) + 'M';
      if (n >= 1000) return Math.floor(n / 1000) + 'K';
      return n;
    }

    document.getElementById('videoPlayer').innerHTML = `<iframe src="https://www.youtube.com/embed/${videoId}?autoplay=1" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>`;

    async function loadVideoDetails() {
      try {
        const response = await fetch(`${BASE_URL}/videos?part=snippet,statistics&id=${videoId}&key=${API_KEY}`);
        const data = await response.json();
        if (data.items && data.items.length > 0) {
          const video = data.items[0];
          document.getElementById('videoTitle').textContent = video.snippet.title;
          document.getElementById('channelName').textContent = video.snippet.channelTitle;
          document.getElementById('channelAvatar').textContent = getChannelInitial(video.snippet.channelTitle);
          document.getElementById('subscribers').textContent = 'Subscribe';
          document.getElementById('likes').textContent = formatViews(video.statistics.likeCount || 0);
        }
      } catch (err) {
        console.error('Error loading video:', err);
        document.getElementById('videoTitle').textContent = 'Video Player';
      }
    }

    async function loadSuggested() {
      try {
        const response = await fetch(`${BASE_URL}/search?part=snippet&relatedToVideoId=${videoId}&type=video&maxResults=10&key=${API_KEY}`);
        const data = await response.json();
        if (data.items) {
          const html = data.items.map(item => `
            <div class="suggested-video" onclick="playVideo('${item.id.videoId}')">
              <div class="suggested-thumb">
                <img src="${item.snippet.thumbnails.medium.url}" alt="${item.snippet.title}">
              </div>
              <div class="suggested-info">
                <div class="suggested-title">${item.snippet.title}</div>
                <div class="suggested-meta">${item.snippet.channelTitle}</div>
              </div>
            </div>
          `).join('');
          document.getElementById('suggestedVideos').innerHTML = html;
        }
      } catch (err) {
        console.error('Error loading suggestions:', err);
      }
    }

    function playVideo(id) {
      localStorage.setItem('currentVideoId', id);
      window.location.reload();
    }

    loadVideoDetails();
    loadSuggested();
  </script>
</body>
</html>
